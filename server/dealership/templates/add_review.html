<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #343a40; }
        .navbar-brand, .nav-link { color: white !important; }
        .review-form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 40px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="/">🚗 Cars Dealership</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            {% if user.is_authenticated %}
            <li class="nav-item"><a class="nav-link" href="/logout">Logout ({{ user.username }})</a></li>
            {% endif %}
        </ul>
    </div>
</nav>

<div class="container">
    <div class="review-form">
        <h2 class="mb-4">Post a Review for Dealer #{{ dealer_id }}</h2>
        <form method="POST" action="/add_review/{{ dealer_id }}/">
            {% csrf_token %}
            <div class="form-group">
                <label>Review</label>
                <textarea class="form-control" name="review" rows="4" placeholder="Write your review here..." required></textarea>
            </div>
            <div class="form-group">
                <label>Car Make</label>
                <input type="text" class="form-control" name="car_make" placeholder="e.g. Toyota" required>
            </div>
            <div class="form-group">
                <label>Car Model</label>
                <input type="text" class="form-control" name="car_model" placeholder="e.g. Camry" required>
            </div>
            <div class="form-group">
                <label>Car Year</label>
                <input type="number" class="form-control" name="car_year" placeholder="e.g. 2022" required>
            </div>
            <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" name="purchase" id="purchase">
                <label class="form-check-label" for="purchase">I purchased a car here</label>
            </div>
            <button type="submit" class="btn btn-dark btn-block">Submit Review</button>
        </form>
    </div>
</div>

</body>
</html>
